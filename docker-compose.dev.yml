version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_app
    working_dir: /var/www/projeto-conta-azul
    volumes:
      - ./:/var/www/projeto-conta-azul
    depends_on:
      - pgsql
    networks:
      - laravel

  # Serviço para o Queue Worker (processa os jobs)
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_queue
    working_dir: /var/www/projeto-conta-azul
    volumes:
      - ./:/var/www/projeto-conta-azul
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=3", "--timeout=90"]
    depends_on:
      - pgsql
    networks:
      - laravel

  # Serviço para o Scheduler (roda a cada minuto)
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_scheduler
    working_dir: /var/www/projeto-conta-azul
    volumes:
      - ./:/var/www/projeto-conta-azul
    # schedule:work mantém o processo rodando e executando as tarefas programadas
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      - pgsql
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: conta_azul_nginx
    ports:
      - "81:80"
    volumes:
      - ./:/var/www/projeto-conta-azul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  pgsql:
    image: postgres:16
    container_name: conta_azul_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5447:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - laravel


  redis:
    image: redis:7-alpine
    container_name: conta_azul_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - laravel

volumes:
  pgdata:
  redisdata:

networks:
  laravel: