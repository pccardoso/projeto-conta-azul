version: "3.9"

services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_app
    working_dir: /var/www/projeto-conta-azul
    volumes:
      - ./:/var/www/projeto-conta-azul
    depends_on:
      - pgsql
    networks:
      - laravel

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_queue
    working_dir: /var/www/projeto-conta-azul
    command: php artisan queue:work --tries=3 --timeout=60
    volumes:
      - ./:/var/www/projeto-conta-azul
    depends_on:
      - pgsql
      - app
    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: conta_azul_scheduler
    working_dir: /var/www/projeto-conta-azul
    command: php artisan schedule:work
    volumes:
      - ./:/var/www/projeto-conta-azul
    depends_on:
      - app
    networks:
      - laravel

  nginx:
    image: nginx:latest
    container_name: conta_azul_nginx
    ports:
      - "81:80"
    volumes:
      - ./:/var/www/projeto-conta-azul
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  pgsql:
    image: postgres:16
    container_name: conta_azul_pgsql
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5447:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - laravel

volumes:
  pgdata:

networks:
  laravel: